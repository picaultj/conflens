services:
  app:
    build: .
    image: conflens
    ports:
      - "6868:6868"
    # API keys / endpoints — copy .env.example to .env first.
    env_file:
      - path: .env
        required: false
    environment:
      - NO_PROXY=$NO_PROXY # to avoid communication issues
      - no_proxy=$no_proxy # to avoid communication issues
    volumes:
      # Persist scraped listings, abstracts and classification results.
      - cache:/home/app/.cache/conflens
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6868/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  cache:
