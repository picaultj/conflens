name: Sync to Hugging Face Space

# Mirror main to a Hugging Face **Docker** Space on every push, keeping the Space
# in sync with this repo. The Space builds the repo's Dockerfile (which serves on
# 0.0.0.0:8080 — matched by `app_port: 8080` in the Space metadata).
#
# One-time setup (see README → "Deploy to Hugging Face Spaces"):
#   1. Create a Gradio Space on huggingface.co.
#   2. Add a repo secret HF_TOKEN (a HF access token with write scope).
#   3. Optionally set repo variables HF_USERNAME / HF_SPACE (they default to
#      "picault" and "conflens").
#   4. Add your LLM API keys as *Space* secrets in the Space settings.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Prepend Space metadata to README
        run: |
          set -euo pipefail
          cat .github/huggingface/space_readme_header.md README.md > README.hf
          mv README.hf README.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Add Hugging Face Space metadata [skip ci]"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # HF owner defaults to 'picault' (the HF username differs from the
          # GitHub owner 'picaultj'); override with the HF_USERNAME repo variable.
          HF_USERNAME: ${{ vars.HF_USERNAME || 'picault' }}
          HF_SPACE: ${{ vars.HF_SPACE || 'conflens' }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::Missing HF_TOKEN secret. Add a Hugging Face write token as a repo secret named HF_TOKEN (see README → Deploy to Hugging Face Spaces)."
            exit 1
          fi
          echo "Syncing to https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git" \
            HEAD:main
