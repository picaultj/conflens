name: Tests

# pytest + package build on every pushed commit (any branch) and every pull
# request. Concurrency keys on the branch name so a branch's push and
# pull_request events collapse into a single run and stale runs are superseded.
on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (base + dev + gradio)
        run: uv sync --extra gradio   # so the Gradio GUI is covered by the suite

      - name: Tests (pytest)
        run: uv run pytest -q

      - name: Build package
        run: uv build
